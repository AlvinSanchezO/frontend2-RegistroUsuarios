name: Publicar Imagen en Docker Hub

on:
  push:
    tags:
      - 'v*' # Se activa cuando creas un tag como v1.0.0

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Login en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Construir y subir imagen
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/frontend2-registro:latest, ${{ secrets.DOCKER_USERNAME }}/frontend2-registro:${{ github.ref_name }}
